<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Трекер задач{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .task-list { list-style: none; padding: 0; }
        .task-item { border: 1px solid #ddd; margin: 10px 0; padding: 15px; }
        .btn { padding: 8px 15px; text-decoration: none; background: #007bff; color: white; border: none; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        form { max-width: 600px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; margin-top: 5px; }
        textarea { min-height: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><a href="{% url 'index' %}" style="text-decoration: none; color: black;">Трекер задач</a></h1>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
