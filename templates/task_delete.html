{% extends 'base.html' %}

{% block title %}Удалить задачу{% endblock %}

{% block content %}
<h2>Удалить задачу</h2>
<p>Вы уверены, что хотите удалить задачу "{{ task.summary }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'task_detail' task.pk %}" class="btn">Отмена</a>
</form>
{% endblock %}
